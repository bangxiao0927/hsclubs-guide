name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Select an available iPhone Simulator
        run: |
          if ! xcrun simctl list runtimes available | grep -q 'iOS'; then
            xcodebuild -downloadPlatform iOS
          fi

          simulator_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          for runtime in sorted(devices, reverse=True):
              for device in devices[runtime]:
                  if device["name"].startswith("iPhone") and device["isAvailable"]:
                      print(device["udid"])
                      raise SystemExit
          ')

          if [ -z "$simulator_id" ]; then
            runtime_id=$(xcrun simctl list runtimes available -j | python3 -c '
          import json, sys
          runtimes = [
              runtime for runtime in json.load(sys.stdin)["runtimes"]
              if runtime["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS")
              and runtime["isAvailable"]
          ]
          print(sorted(runtimes, key=lambda runtime: runtime["version"], reverse=True)[0]["identifier"])
          ')
            device_type=$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          devices = [
              device for device in json.load(sys.stdin)["devicetypes"]
              if device["name"].startswith("iPhone")
          ]
          print(devices[0]["identifier"])
          ')
            simulator_id=$(xcrun simctl create "HSclubs Guide CI" "$device_type" "$runtime_id")
          fi

          echo "SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"

      - name: Verify generated project is current
        run: |
          brew install xcodegen
          cp -R HSclubsGuide.xcodeproj /tmp/HSclubsGuide.xcodeproj
          xcodegen generate
          diff -ru /tmp/HSclubsGuide.xcodeproj HSclubsGuide.xcodeproj

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project HSclubsGuide.xcodeproj \
            -scheme HSclubsGuide \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
