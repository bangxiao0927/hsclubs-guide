name: HSclubsGuide
options:
  bundleIdPrefix: org.hsclubs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: HSclubs Guide
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    TARGETED_DEVICE_FAMILY: "1"
targets:
  HSclubsGuide:
    type: application
    platform: iOS
    sources:
      - path: HSclubsGuide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.hsclubs.guide
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug: {}
        Release: {}
    scheme:
      testTargets:
        - HSclubsGuideTests
        - HSclubsGuideUITests
      gatherCoverageData: true
  HSclubsGuideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HSclubsGuideTests
      - path: HSclubsGuide/Resources/Fixtures
        buildPhase: resources
    dependencies:
      - target: HSclubsGuide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.hsclubs.guide.tests
  HSclubsGuideUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HSclubsGuideUITests
    dependencies:
      - target: HSclubsGuide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.hsclubs.guide.uitests
